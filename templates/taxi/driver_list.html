{% extends "base.html" %}
{% block content %}
  {% if driver_list %}
    <table>
      <tr>
        <th>Username</th>
        <th>First Name</th>
        <th>Last Name</th>
      </tr>
      {% for driver in driver_list %}
        <tr>
          <td> <a href="{% url "taxi:driver-detail" driver.id %}"> {{ driver.username }} </a> </td>
          <td> {{ driver.first_name }} </td>
          <td> {{ driver.last_name }} </td>
        </tr>
      {% endfor %}
    </table>
  {% else %}
    <span> No Drivers found </span>
  {% endif %}
{% endblock %}
