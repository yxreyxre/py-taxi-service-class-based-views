{% extends "base.html" %}
{% block content %}
  {% if manufacturer_list %}
    <table>
      <tr>
        <th> Name </th>
        <th> Country </th>
      </tr>
      {% for manufacturer in manufacturer_list %}
        <tr>
          <td> {{ manufacturer.name }}</td>
          <td> {{ manufacturer.country }}</td>
        </tr>
      {% endfor %}
    </table>
  {% else %}
    <span>No manufacturer found</span>
  {% endif %}
{% endblock %}
